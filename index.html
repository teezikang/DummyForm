<form id="registrationForm">
  <label for="paperID">Paper ID:</label><br>
  <input type="text" id="paperID" required><br><br>

  <label for="paperTitle">Paper Title:</label><br>
  <input type="text" id="paperTitle" required><br><br>

  <label for="presenterName">Presenter Name:</label><br>
  <input type="text" id="presenterName" required><br><br>

  <label for="affiliation">Affiliation:</label><br> <input type="text" id="affiliation" required><br><br>

  <label for="emailAddress">Email Address:</label><br>
  <input type="email" id="emailAddress" required><br><br>

  <label for="phoneNumber">Phone Number (e.g. 011xxxxxxxx):</label><br>
  <input type="text" id="phoneNumber" required><br><br> <label for="category">Category:</label><br>
  <select id="category">
    <option value="Student-Online Presenter">Student-Online Presenter</option>
    <option value="Student-Onsite Presenter">Student-Onsite Presenter</option>
    <option value="Professional-Online Presenter">Professional-Online Presenter</option>
    <option value="Professional-Onsite Presenter">Professional-Onsite Presenter</option>
    <option value="Attendee (Without Paper) - Online">Attendee (Without Paper) - Online</option>
    <option value="Attendee (Without Paper) - Onsite">Attendee (Without Paper) - Onsite</option>
  </select><br><br>

  <label for="payment">Payment:</label><br>
  <input type="text" id="payment" required><br><br>

  <label for="paymentProof">Payment Proof:</label><br>
  <input type="file" id="paymentProof" required><br><br> <button type="submit">Register Now</button>
</form>

<div id="responseMessage"></div>

<script>
document.getElementById('registrationForm').addEventListener('submit', function(e) {
  e.preventDefault(); 
  
  const msgDiv = document.getElementById('responseMessage');
  msgDiv.innerText = "Submitting registration and file...";

  const fileInput = document.getElementById('paymentProof');
  
  // Prepare base structure for payload
  const formData = {
    paperID: document.getElementById('paperID').value,
    paperTitle: document.getElementById('paperTitle').value,
    presenterName: document.getElementById('presenterName').value,
    affiliation: document.getElementById('affiliation').value,
    emailAddress: document.getElementById('emailAddress').value,
    phoneNumber: document.getElementById('phoneNumber').value,
    category: document.getElementById('category').value,
    payment: document.getElementById('payment').value,
    fileData: null,
    fileName: null,
    fileMimeType: null
  };

  const webAppUrl = 'https://script.google.com/macros/s/AKfycbzPJJ1x1bKd_hqTOvbZfse5AdvRKW3ib1aDjDMSxkuarHAdkCLU4Z8H1wo_TebBbk3F_A/exec';

  // Function to submit data to Google
  function sendData(payload) {
    fetch(webAppUrl, {
      method: 'POST',
      mode: 'no-cors', 
      cache: 'no-cache',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    .then(response => {
      msgDiv.innerText = "Registration & Receipt Upload Successful!";
      document.getElementById('registrationForm').reset();
    })
    .catch(error => {
      msgDiv.innerText = "Error submitting registration. Please try again.";
      console.error('Error:', error);
    });
  }

  // Check if a file was selected by user
  if (fileInput.files.length > 0) {
    const file = fileInput.files[0];
    const reader = new FileReader();
    
    // Read the file structure and convert it to Base64 format
    reader.onload = function(e) {
      const rawLog = e.target.result;
      formData.fileData = rawLog.substr(rawLog.indexOf(',') + 1); // Extract base64 text string
      formData.fileName = file.name;
      formData.fileMimeType = file.type;
      
      // Fire fetch after file completes encoding conversion
      sendData(formData);
    };
    
    reader.readAsDataURL(file);
  } else {
    // If no file, just send textual fields directly
    sendData(formData);
  }
});
</script>
