<script>
const SCRIPT_URL =
'https://script.google.com/macros/s/AKfycbyqpeb1eKUrocn6t-w7nMksVBkLgKAqsHt2dxr95vwUQxxLsCoT7DrXF5KUXMBehUEGmA/exec';

document
.getElementById('conferenceForm')
.addEventListener('submit', async function(e){

    e.preventDefault();

    const resultDiv =
        document.getElementById('result');

    resultDiv.innerHTML = 'Submitting...';

    try {

        const fileInput =
            document.getElementById('receiptFile');

        const file =
            fileInput.files[0];

        let fileData = '';
        let fileName = '';
        let fileMimeType = '';

        if (file) {

            const base64 =
                await convertToBase64(file);

            fileData =
                base64.split(',')[1];

            fileName =
                file.name;

            fileMimeType =
                file.type;
        }

        const payload = {

            paperID:
                document.querySelector('[name="paperID"]').value,

            paperTitle:
                document.querySelector('[name="paperTitle"]').value,

            presenterName:
                document.querySelector('[name="presenterName"]').value,

            affiliation:
                document.querySelector('[name="affiliation"]').value,

            emailAddress:
                document.querySelector('[name="emailAddress"]').value,

            phoneNumber:
                document.querySelector('[name="phoneNumber"]').value,

            category:
                document.querySelector('[name="category"]').value,

            payment:
                document.querySelector('[name="payment"]').value,

            fileData:
                fileData,

            fileName:
                fileName,

            fileMimeType:
                fileMimeType
        };

        await fetch(
            SCRIPT_URL,
            {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify(payload)
            }
        );

        resultDiv.innerHTML =
            '✅ Submission sent. Please check Google Sheet.';

        document
            .getElementById('conferenceForm')
            .reset();

    } catch (error) {

        console.error(error);

        resultDiv.innerHTML =
            '❌ Error: ' + error.message;
    }

});

function convertToBase64(file) {

    return new Promise((resolve, reject) => {

        const reader =
            new FileReader();

        reader.readAsDataURL(file);

        reader.onload =
            () => resolve(reader.result);

        reader.onerror =
            error => reject(error);

    });

}
</script>
