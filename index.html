<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cloud Drop - Google Drive File Uploader</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient-1: #090d16;
      --bg-gradient-2: #0f172a;
      --accent-primary: #818cf8; /* indigo */
      --accent-secondary: #c084fc; /* purple */
      --accent-glow: rgba(129, 140, 248, 0.15);
      --card-bg: rgba(30, 41, 59, 0.45);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --success: #34d399;
      --error: #f87171;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 10% 20%, rgba(139, 92, 246, 0.15) 0%, transparent 40%),
                  radial-gradient(circle at 90% 80%, rgba(59, 130, 246, 0.15) 0%, transparent 40%),
                  var(--bg-gradient-1);
      background-attachment: fixed;
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      overflow-x: hidden;
    }

    /* Decorative background glowing orb */
    .glow-orb {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: -1;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 580px;
      z-index: 10;
    }

    /* Premium Glassmorphic Card */
    .card {
      background: var(--card-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      padding: 2.5rem;
      box-shadow: 0 20px 40px -15px rgba(0, 0, 0, 0.5),
                  inset 0 1px 1px rgba(255, 255, 255, 0.1);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      box-shadow: 0 25px 50px -12px rgba(99, 102, 241, 0.15),
                  0 20px 40px -15px rgba(0, 0, 0, 0.5),
                  inset 0 1px 1px rgba(255, 255, 255, 0.15);
    }

    header {
      text-align: center;
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 2.25rem;
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff 30%, var(--accent-primary) 70%, var(--accent-secondary));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    p.subtitle {
      color: var(--text-muted);
      font-size: 0.95rem;
      font-weight: 400;
    }

    /* Settings section to config Apps Script URL */
    .settings-panel {
      margin-bottom: 1.75rem;
      background: rgba(15, 23, 42, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 1rem;
      transition: all 0.3s ease;
    }

    .settings-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      user-select: none;
    }

    .settings-header span {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .settings-header svg {
      transition: transform 0.3s ease;
    }

    .settings-header.active svg {
      transform: rotate(180deg);
    }

    .settings-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0, 1, 0, 1);
    }

    .settings-header.active + .settings-content {
      max-height: 200px;
      margin-top: 0.75rem;
      transition: max-height 0.3s cubic-bezier(1, 0, 1, 0);
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      color: var(--accent-primary);
    }

    input[type="text"] {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      color: var(--text-main);
      font-family: inherit;
      font-size: 0.85rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="text"]:focus {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.25);
    }

    /* Drag & Drop Area */
    .dropzone {
      border: 2px dashed rgba(255, 255, 255, 0.15);
      border-radius: 18px;
      padding: 3rem 1.5rem;
      text-align: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.01);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent-primary);
      background: rgba(129, 140, 248, 0.04);
      transform: scale(1.01);
    }

    .dropzone.dragover {
      box-shadow: 0 0 20px rgba(129, 140, 248, 0.1);
    }

    .upload-icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 1.25rem;
      color: var(--accent-primary);
      transition: transform 0.3s ease, color 0.3s ease;
    }

    .dropzone:hover .upload-icon, .dropzone.dragover .upload-icon {
      transform: translateY(-5px);
      color: var(--accent-secondary);
      background: rgba(255, 255, 255, 0.06);
    }

    .dropzone input[type="file"] {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .dropzone h3 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .dropzone p {
      font-size: 0.85rem;
      color: var(--text-muted);
    }

    /* Selected File View */
    .file-details {
      display: none;
      margin-top: 1.5rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 1.25rem;
      animation: slideIn 0.3s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .file-info {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .file-icon-wrapper {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent-secondary);
    }

    .file-meta {
      flex: 1;
      min-width: 0;
    }

    .file-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .file-size {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.15rem;
    }

    /* Button and Progress bar style */
    .progress-bar-container {
      height: 6px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      display: none;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .action-row {
      display: flex;
      gap: 0.75rem;
    }

    button {
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      padding: 0.85rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      outline: none;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-primary {
      flex: 2;
      background: linear-gradient(135deg, var(--accent-primary) 0%, #6366f1 100%);
      color: white;
      border: none;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(99, 102, 241, 0.4);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-primary:disabled {
      background: rgba(255, 255, 255, 0.08);
      color: var(--text-muted);
      cursor: not-allowed;
      box-shadow: none;
    }

    .btn-secondary {
      flex: 1;
      background: transparent;
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .btn-secondary:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.03);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Status Alerts */
    .status-alert {
      margin-top: 1.5rem;
      border-radius: 12px;
      padding: 1rem;
      font-size: 0.9rem;
      display: none;
      align-items: flex-start;
      gap: 0.75rem;
      line-height: 1.4;
      animation: slideIn 0.3s ease forwards;
    }

    .status-alert.success {
      background: rgba(52, 211, 153, 0.1);
      border: 1px solid rgba(52, 211, 153, 0.25);
      color: #a7f3d0;
    }

    .status-alert.error {
      background: rgba(248, 113, 113, 0.1);
      border: 1px solid rgba(248, 113, 113, 0.25);
      color: #fca5a5;
    }

    .status-alert a {
      color: #34d399;
      text-decoration: underline;
      font-weight: 600;
      word-break: break-all;
    }

    .status-alert a:hover {
      color: #6ee7b7;
    }

    .status-icon {
      flex-shrink: 0;
      width: 20px;
      height: 20px;
      margin-top: 2px;
    }

    /* Footer instructions link */
    footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.8rem;
      color: var(--text-muted);
    }

    footer a {
      color: var(--accent-primary);
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div class="glow-orb"></div>

  <div class="container">
    <div class="card">
      <header>
        <h1>Cloud Drop</h1>
        <p class="subtitle">Direct-to-Drive Upload Portal</p>
      </header>

      <!-- Configuration Panel -->
      <div class="settings-panel">
        <div class="settings-header" id="settingsToggle">
          <span>
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            Google Apps Script Configuration
          </span>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
        <div class="settings-content">
          <div style="padding-top: 0.75rem;">
            <label for="scriptUrl">Web App URL</label>
            <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec" autocomplete="off">
            <span style="font-size: 0.75rem; color: var(--text-muted); display: block; margin-top: 0.4rem;">
              Paste your deployed script's Web App URL here. Saved locally.
            </span>
          </div>
        </div>
      </div>

      <!-- Drag and Drop Area -->
      <div class="dropzone" id="dropzone">
        <input type="file" id="fileInput">
        <div class="upload-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        </div>
        <h3>Drag & drop your file here</h3>
        <p>or click to browse from device</p>
      </div>

      <!-- File details and Action Button -->
      <div class="file-details" id="fileDetails">
        <div class="file-info">
          <div class="file-icon-wrapper">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" id="fileIcon"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
          </div>
          <div class="file-meta">
            <div class="file-name" id="fileName">document.pdf</div>
            <div class="file-size" id="fileSize">2.4 MB</div>
          </div>
        </div>
        
        <div class="progress-bar-container" id="progressContainer">
          <div class="progress-bar" id="progressBar"></div>
        </div>

        <div class="action-row">
          <button class="btn-secondary" id="btnCancel">Cancel</button>
          <button class="btn-primary" id="btnUpload">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            Upload to Google Drive
          </button>
        </div>
      </div>

      <!-- Status Alerts -->
      <div class="status-alert" id="statusAlert">
        <!-- Dynamic content filled by JavaScript -->
      </div>
    </div>
    
    <footer>
      <p>Need help? Follow the <a href="instruction_guide.md" target="_blank">Setup Instructions</a>.</p>
    </footer>
  </div>

  <script>
    // State management
    let selectedFile = null;
    
    // Elements
    const settingsHeader = document.getElementById('settingsToggle');
    const scriptUrlInput = document.getElementById('scriptUrl');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileDetails = document.getElementById('fileDetails');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const btnCancel = document.getElementById('btnCancel');
    const btnUpload = document.getElementById('btnUpload');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusAlert = document.getElementById('statusAlert');

    // Toggle Config Settings dropdown
    settingsHeader.addEventListener('click', () => {
      settingsHeader.classList.toggle('active');
    });

    // LocalStorage management for Web App URL
    window.addEventListener('DOMContentLoaded', () => {
      const savedUrl = localStorage.getItem('gas_web_app_url');
      if (savedUrl) {
        scriptUrlInput.value = savedUrl;
      } else {
        // Expand settings panel if empty to guide the user
        settingsHeader.classList.add('active');
      }
    });

    scriptUrlInput.addEventListener('input', () => {
      localStorage.setItem('gas_web_app_url', scriptUrlInput.value.trim());
    });

    // File selection drag-and-drop event listeners
    ['dragenter', 'dragover'].forEach(eventName => {
      dropzone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      }, false);
    });

    ['dragleave', 'drop'].forEach(eventName => {
      dropzone.addEventListener(eventName, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      }, false);
    });

    dropzone.addEventListener('drop', (e) => {
      const dt = e.dataTransfer;
      const files = dt.files;
      if (files.length) {
        handleFileSelect(files[0]);
      }
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) {
        handleFileSelect(e.target.files[0]);
      }
    });

    function handleFileSelect(file) {
      selectedFile = file;
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = formatBytes(file.size);
      
      // Reset progress & alerts
      resetProgress();
      hideAlert();
      
      // Update UI elements
      dropzone.style.display = 'none';
      fileDetails.style.display = 'block';
    }

    function formatBytes(bytes, decimals = 2) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const dm = decimals < 0 ? 0 : decimals;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return parseFloat((bytes / Math.pow(k, i)).toFixed(dm)) + ' ' + sizes[i];
    }

    btnCancel.addEventListener('click', () => {
      clearSelection();
    });

    function clearSelection() {
      selectedFile = null;
      fileInput.value = '';
      fileDetails.style.display = 'none';
      dropzone.style.display = 'flex';
      resetProgress();
    }

    function resetProgress() {
      progressContainer.style.display = 'none';
      progressBar.style.style = '0%';
      btnUpload.disabled = false;
      btnCancel.disabled = false;
    }

    // Alert functions
    function showAlert(type, message, htmlContent = null) {
      statusAlert.className = `status-alert ${type}`;
      statusAlert.style.display = 'flex';
      
      let icon = '';
      if (type === 'success') {
        icon = `<svg class="status-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      } else {
        icon = `<svg class="status-icon" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>`;
      }
      
      statusAlert.innerHTML = `
        ${icon}
        <div>
          ${htmlContent ? htmlContent : `<span>${message}</span>`}
        </div>
      `;
    }

    function hideAlert() {
      statusAlert.style.display = 'none';
    }

    // Upload Action
    btnUpload.addEventListener('click', async () => {
      const url = scriptUrlInput.value.trim();
      if (!url) {
        settingsHeader.classList.add('active');
        scriptUrlInput.focus();
        showAlert('error', 'Please configure your Google Apps Script Web App URL first.');
        return;
      }

      if (!selectedFile) return;

      // Disable inputs and show progress bar
      btnUpload.disabled = true;
      btnCancel.disabled = true;
      progressContainer.style.display = 'block';
      progressBar.style.width = '25%';
      hideAlert();

      // Read file and encode to Base64
      const reader = new FileReader();
      
      reader.onload = async function(e) {
        progressBar.style.width = '50%';
        const base64Data = e.target.result;
        
        const payload = {
          name: selectedFile.name,
          type: selectedFile.type,
          base64: base64Data
        };

        try {
          progressBar.style.width = '75%';
          
          // Google Apps Script doesn't handle CORS preflight OPTIONS requests cleanly,
          // so we send it as text/plain which behaves as a "simple request" and bypasses OPTIONS preflight.
          const response = await fetch(url, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: {
              'Content-Type': 'text/plain;charset=utf-8'
            }
          });

          if (!response.ok) {
            throw new Error(`HTTP Error: ${response.status} ${response.statusText}`);
          }

          const result = await response.json();
          progressBar.style.width = '100%';

          if (result.status === 'success') {
            showAlert('success', '', `
              <strong>Success!</strong> File uploaded successfully to Google Drive.<br>
              <a href="${result.fileUrl}" target="_blank" style="margin-top: 0.5rem; display: inline-block;">Open uploaded file: ${result.fileName} ↗</a>
            `);
          } else {
            throw new Error(result.message || 'Unknown upload error occurred.');
          }

        } catch (error) {
          console.error(error);
          showAlert('error', `Upload Failed: ${error.message}. Make sure your URL is correct and deployed with permissions set to "Anyone".`);
        } finally {
          btnUpload.disabled = false;
          btnCancel.disabled = false;
        }
      };

      reader.onerror = function() {
        showAlert('error', 'Failed to read file from disk.');
        btnUpload.disabled = false;
        btnCancel.disabled = false;
      };

      reader.readAsDataURL(selectedFile);
    });
  </script>
</body>
</html>
