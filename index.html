<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google Drive File Uploader Component</title>
  
  <style>
    /* 1. STYLING (CSS) */
    .gdrive-uploader-container {
      max-width: 500px;
      margin: 2rem auto;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: #333;
    }

    /* Configuration Panel (Collabsible) */
    .settings-panel {
      margin-bottom: 1.5rem;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      background: #f8fafc;
      overflow: hidden;
    }

    .settings-header {
      padding: 0.75rem 1rem;
      background: #edf2f7;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.85rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }

    .settings-content {
      padding: 1rem;
      display: none;
      border-top: 1px solid #e2e8f0;
    }

    .settings-panel.active .settings-content {
      display: block;
    }

    label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }

    input[type="text"] {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border: 1px solid #cbd5e0;
      border-radius: 6px;
      font-size: 0.85rem;
      box-sizing: border-box;
    }

    /* Drag & Drop Area */
    .dropzone {
      border: 2px dashed #a0aec0;
      border-radius: 12px;
      padding: 2.5rem 1.5rem;
      text-align: center;
      cursor: pointer;
      position: relative;
      background: #fff;
      transition: all 0.2s ease-in-out;
    }

    .dropzone:hover, .dropzone.dragover {
      border-color: #6366f1;
      background: #f0f4ff;
    }

    .dropzone input[type="file"] {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .upload-icon {
      font-size: 2.5rem;
      margin-bottom: 0.75rem;
      color: #a0aec0;
      transition: transform 0.2s;
    }

    .dropzone:hover .upload-icon {
      transform: translateY(-3px);
      color: #6366f1;
    }

    .dropzone h3 {
      margin: 0 0 0.25rem 0;
      font-size: 1.1rem;
      color: #2d3748;
    }

    .dropzone p {
      margin: 0;
      font-size: 0.85rem;
      color: #718096;
    }

    /* Selected File View */
    .file-details {
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      padding: 1rem;
      background: #fff;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
    }

    .file-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-weight: 500;
      font-size: 0.95rem;
      color: #2d3748;
      margin-bottom: 0.75rem;
    }

    .file-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 75%;
    }

    .file-size {
      font-size: 0.8rem;
      color: #718096;
    }

    /* Progress bar */
    .progress-bar-container {
      height: 6px;
      background: #edf2f7;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .progress-bar {
      height: 100%;
      width: 0%;
      background: #6366f1;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    /* Buttons */
    .action-row {
      display: flex;
      gap: 0.75rem;
    }

    button {
      padding: 0.6rem 1.2rem;
      border-radius: 6px;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      border: 1px solid #cbd5e0;
      background: #fff;
      transition: all 0.15s ease;
    }

    button:hover:not(:disabled) {
      background: #f7fafc;
    }

    .btn-primary {
      flex: 2;
      background: #6366f1;
      color: #fff;
      border: none;
    }

    .btn-primary:hover:not(:disabled) {
      background: #4f46e5;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Alerts */
    .status-alert {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      line-height: 1.4;
    }

    .status-alert.success {
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      color: #166534;
    }

    .status-alert.error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #991b1b;
    }

    .status-alert a {
      color: #2563eb;
      text-decoration: underline;
      font-weight: 600;
    }
  </style>
</head>
<body>

  <!-- 2. HTML STRUCTURE -->
  <div class="gdrive-uploader-container">
    
    <!-- Hidden input to hold URL for form submissions -->
    <input type="hidden" id="gdriveFileUrl" name="gdriveFileUrl">

    <!-- Config Settings (Collapsible panel to enter/save Web App URL) -->
    <div class="settings-panel" id="settingsPanel">
      <div class="settings-header" onclick="toggleSettings()">
        <span>🔧 Google Apps Script Config</span>
        <span id="settingsArrow">▼</span>
      </div>
      <div class="settings-content">
        <label for="scriptUrl">Web App URL</label>
        <input type="text" id="scriptUrl" placeholder="https://script.google.com/macros/s/.../exec">
      </div>
    </div>

    <!-- Drag & Drop Zone -->
    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput">
      <div class="upload-icon">📁</div>
      <h3>Drag & drop your file here</h3>
      <p>or click to browse from device</p>
    </div>

    <!-- Selected File Details & Actions -->
    <div class="file-details" id="fileDetails" style="display: none;">
      <div class="file-info">
        <span class="file-name" id="fileName">file.name</span>
        <span class="file-size" id="fileSize">0 KB</span>
      </div>
      
      <div class="progress-bar-container" id="progressContainer" style="display: none;">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <div class="action-row">
        <button type="button" id="btnCancel">Cancel</button>
        <button type="button" class="btn-primary" id="btnUpload">Upload to Google Drive</button>
      </div>
    </div>

    <!-- Status Messages -->
    <div class="status-alert" id="statusAlert" style="display: none;"></div>
  </div>

  <!-- 3. JAVASCRIPT CONTROLLER -->
  <script>
    let selectedFile = null;

    const panel = document.getElementById('settingsPanel');
    const arrow = document.getElementById('settingsArrow');
    const scriptUrlInput = document.getElementById('scriptUrl');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const fileDetails = document.getElementById('fileDetails');
    const fileNameEl = document.getElementById('fileName');
    const fileSizeEl = document.getElementById('fileSize');
    const btnCancel = document.getElementById('btnCancel');
    const btnUpload = document.getElementById('btnUpload');
    const progressContainer = document.getElementById('progressContainer');
    const progressBar = document.getElementById('progressBar');
    const statusAlert = document.getElementById('statusAlert');
    const gdriveFileUrlInput = document.getElementById('gdriveFileUrl');

    // Toggle Config Settings panel
    function toggleSettings() {
      panel.classList.toggle('active');
      arrow.textContent = panel.classList.contains('active') ? '▲' : '▼';
    }

    // Load & Save Web App URL locally
    window.addEventListener('DOMContentLoaded', () => {
      const savedUrl = localStorage.getItem('gas_web_app_url');
      if (savedUrl) {
        scriptUrlInput.value = savedUrl;
      } else {
        panel.classList.add('active');
        arrow.textContent = '▲';
      }
    });

    scriptUrlInput.addEventListener('input', () => {
      localStorage.setItem('gas_web_app_url', scriptUrlInput.value.trim());
    });

    // Drag-and-Drop Handlers
    ['dragenter', 'dragover'].forEach(name => {
      dropzone.addEventListener(name, (e) => {
        e.preventDefault();
        dropzone.classList.add('dragover');
      });
    });

    ['dragleave', 'drop'].forEach(name => {
      dropzone.addEventListener(name, (e) => {
        e.preventDefault();
        dropzone.classList.remove('dragover');
      });
    });

    dropzone.addEventListener('drop', (e) => {
      const files = e.dataTransfer.files;
      if (files.length) handleFileSelect(files[0]);
    });

    fileInput.addEventListener('change', (e) => {
      if (e.target.files.length) handleFileSelect(e.target.files[0]);
    });

    function handleFileSelect(file) {
      selectedFile = file;
      fileNameEl.textContent = file.name;
      fileSizeEl.textContent = `${(file.size / 1024).toFixed(1)} KB`;
      
      dropzone.style.display = 'none';
      fileDetails.style.display = 'block';
      progressContainer.style.display = 'none';
      progressBar.style.width = '0%';
      statusAlert.style.display = 'none';
    }

    btnCancel.addEventListener('click', () => {
      selectedFile = null;
      fileInput.value = '';
      fileDetails.style.display = 'none';
      dropzone.style.display = 'block';
    });

    // Upload Action
    btnUpload.addEventListener('click', async () => {
      let url = scriptUrlInput.value.trim();
      if (!url) {
        if (!panel.classList.contains('active')) toggleSettings();
        scriptUrlInput.focus();
        showStatus('error', 'Please configure your Web App URL first.');
        return;
      }

      if (!url.endsWith('/exec')) {
        if (!panel.classList.contains('active')) toggleSettings();
        scriptUrlInput.focus();
        showStatus('error', 'Invalid URL. The Web App URL must end with "/exec".');
        return;
      }

      if (!selectedFile) return;

      btnUpload.disabled = true;
      btnCancel.disabled = true;
      progressContainer.style.display = 'block';
      progressBar.style.width = '30%';
      statusAlert.style.display = 'none';

      const reader = new FileReader();
      
      reader.onload = async function(e) {
        progressBar.style.width = '60%';
        const payload = {
          name: selectedFile.name,
          type: selectedFile.type,
          base64: e.target.result
        };

        try {
          const response = await fetch(url, {
            method: 'POST',
            body: JSON.stringify(payload),
            headers: { 'Content-Type': 'text/plain;charset=utf-8' }
          });

          if (!response.ok) throw new Error(`HTTP Error: ${response.status}`);
          
          const result = await response.json();
          progressBar.style.width = '100%';

          if (result.status === 'success') {
            showStatus('success', `Upload complete! <a href="${result.fileUrl}" target="_blank">Open File ↗</a>`);
            gdriveFileUrlInput.value = result.fileUrl; // set URL value to hidden input
          } else {
            throw new Error(result.message || 'Server returned an error.');
          }

        } catch (error) {
          showStatus('error', `Upload Failed: ${error.message}`);
        } finally {
          btnUpload.disabled = false;
          btnCancel.disabled = false;
        }
      };

      reader.onerror = () => {
        showStatus('error', 'Failed to read file from disk.');
        btnUpload.disabled = false;
        btnCancel.disabled = false;
      };

      reader.readAsDataURL(selectedFile);
    });

    function showStatus(type, message) {
      statusAlert.className = `status-alert ${type}`;
      statusAlert.style.display = 'block';
      statusAlert.innerHTML = message;
    }
  </script>
</body>
</html>
