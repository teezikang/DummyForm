<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Google Drive File Upload</title>
</head>
<body>

<div class="drive-uploader-container" style="padding:20px; background:#f9f9f9; border:1px solid #ddd; border-radius:5px; max-width:500px;">
  <h3>Upload Your File</h3>

  <form id="uploadForm">
    <div style="margin-bottom:15px;">
      <input type="file" id="fileInput" required style="display:block; width:100%;">
    </div>

    <button type="submit" id="submitBtn"
      style="background:#7c1dc2; color:#fff; border:none; padding:10px 20px; border-radius:3px; cursor:pointer;">
      Submit to Drive
    </button>
  </form>

  <div id="uploadStatus" style="margin-top:15px; font-weight:bold;"></div>
</div>

<script>
document.getElementById('uploadForm').addEventListener('submit', function (e) {
  e.preventDefault();

  // Replace with your deployed GAS Web App URL
  const webAppUrl = "https://script.google.com/macros/s/AKfycbxLR7ZjdhYj-HHDwp8acCeVIxnv6ofH3oDD0exKTEyiwHM_ONV4ECMbg6vM1jLfxMKB/exec";

  const fileInput = document.getElementById('fileInput');
  const statusDiv = document.getElementById('uploadStatus');
  const submitBtn = document.getElementById('submitBtn');

  if (fileInput.files.length === 0) {
    statusDiv.style.color = "red";
    statusDiv.innerHTML = "Please select a file first.";
    return;
  }

  const file = fileInput.files[0];
  const reader = new FileReader();

  statusDiv.style.color = "#333";
  statusDiv.innerHTML = "Processing file... please wait.";
  submitBtn.disabled = true;

  reader.onload = function (event) {
    const base64String = event.target.result.split(',')[1];

    const payload = {
      filename: file.name,
      mimeType: file.type,
      base64Data: base64String
    };

    fetch(webAppUrl, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: {
        'Content-Type': 'text/plain;charset=utf-8'
      }
    })
    .then(response => response.json())
    .then(data => {
      if (data.status === "success") {
        statusDiv.style.color = "green";
        statusDiv.innerHTML =
          "🎉 File uploaded successfully!<br>" +
          "File ID: " + data.fileId;

        document.getElementById('uploadForm').reset();
      } else {
        statusDiv.style.color = "red";
        statusDiv.innerHTML = "Error: " + data.message;
      }
    })
    .catch(error => {
      console.error(error);
      statusDiv.style.color = "red";
      statusDiv.innerHTML =
        "Upload failed. Check your Web App URL and deployment settings.";
    })
    .finally(() => {
      submitBtn.disabled = false;
    });
  };

  reader.readAsDataURL(file);
});
</script>

</body>
</html>
